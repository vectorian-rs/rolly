<text x="418" y="692" class="v">71.0 ± 0.1</text>
<text x="588" y="692" class="v">211.8 ± 0.3</text>
<text x="728" y="692" class="v best">3.0x faster</text>
<line x1="260" y1="70" x2="260" y2="706" class="grid"/>
<line x1="430" y1="70" x2="430" y2="706" class="grid"/>
<line x1="600" y1="70" x2="600" y2="706" class="grid"/>
<line x1="740" y1="70" x2="740" y2="706" class="grid"/>
<text x="20" y="724" class="subtitle">Source: criterion (cargo bench --features _bench -- comparison). CI = 95% confidence interval on mean.</text>
