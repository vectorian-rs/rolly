<text x="418" y="292" class="v">43.0 ± 0.0</text>
<text x="588" y="292" class="v">132.9 ± 0.2</text>
<text x="728" y="292" class="v best">3.1x faster</text>
<rect x="0" y="306" width="760" height="40" fill="#f9fafb"/>
<line x1="0" y1="346" x2="760" y2="346" class="grid"/>
<text x="32" y="332" class="scenario">Counter (5 attrs cold)</text>
<text x="418" y="332" class="v">520.3 ± 0.8</text>
<text x="588" y="332" class="v">2663.1 ± 5.0</text>
<text x="728" y="332" class="v best">5.1x faster</text>
<line x1="0" y1="386" x2="760" y2="386" class="grid"/>
<text x="32" y="372" class="scenario">Counter (8 attrs)</text>
