<text x="588" y="372" class="v">206.3 ± 0.2</text>
<text x="728" y="372" class="v best">3.0x faster</text>
<rect x="0" y="386" width="760" height="40" fill="#f9fafb"/>
<line x1="0" y1="426" x2="760" y2="426" class="grid"/>
<text x="32" y="412" class="scenario">Counter (no attrs)</text>
<text x="418" y="412" class="v neutral">—</text>
<text x="588" y="412" class="v">4.9 ± 0.0</text>
<text x="728" y="412" class="v neutral">—</text>
<line x1="0" y1="466" x2="760" y2="466" class="grid"/>
<text x="32" y="452" class="scenario">Gauge (3 attrs)</text>
