<text x="418" y="612" class="v">28.6 ± 0.0</text>
<text x="588" y="612" class="v">89.2 ± 0.2</text>
<text x="728" y="612" class="v best">3.1x faster</text>
<rect x="0" y="626" width="760" height="40" fill="#f9fafb"/>
<line x1="0" y1="666" x2="760" y2="666" class="grid"/>
<text x="32" y="652" class="scenario">Histogram (5 attrs)</text>
<text x="418" y="652" class="v">46.3 ± 0.1</text>
<text x="588" y="652" class="v">139.1 ± 0.2</text>
<text x="728" y="652" class="v best">3.0x faster</text>
