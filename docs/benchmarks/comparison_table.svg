<text x="588" y="452" class="v">81.5 ± 0.1</text>
<text x="728" y="452" class="v best">3.2x faster</text>
<rect x="0" y="466" width="760" height="40" fill="#f9fafb"/>
<line x1="0" y1="506" x2="760" y2="506" class="grid"/>
