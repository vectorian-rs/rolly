<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 736" font-family="'Inter','SF Pro Display',system-ui,sans-serif" font-size="14">
<style>
  .title { font-size: 17px; font-weight: 700; fill: #111827; letter-spacing: -0.02em; }
  .subtitle { font-size: 12px; fill: #9ca3af; }
  .hdr { font-size: 12px; font-weight: 600; fill: #6b7280; }
  .scenario { font-size: 14px; fill: #111827; font-weight: 500; }
  .v { font-size: 13px; fill: #374151; text-anchor: end; font-variant-numeric: tabular-nums; }
  .best { fill: #059669; font-weight: 600; }
  .worst { fill: #dc2626; }
  .neutral { fill: #6b7280; }
  .grid { stroke: #e5e7eb; stroke-width: 1; }
  .grid-thick { stroke: #d1d5db; stroke-width: 1.5; }
</style>
<rect width="760" height="736" fill="#ffffff"/>
<text x="20" y="28" class="title">rolly vs OpenTelemetry SDK 0.31 — Criterion Benchmarks (95% CI)</text>
<text x="20" y="48" class="subtitle">Values show mean ± CI half-width in nanoseconds. Green = rolly faster, red = rolly slower.</text>
<rect x="0" y="70" width="760" height="36" fill="#f8fafc"/>
<line x1="0" y1="106" x2="760" y2="106" class="grid-thick"/>
<text x="32" y="93" class="hdr" text-anchor="start">Scenario</text>
<text x="418" y="93" class="hdr" text-anchor="end">rolly (ns)</text>
<text x="588" y="93" class="hdr" text-anchor="end">OTel SDK (ns)</text>
<text x="728" y="93" class="hdr" text-anchor="end">Speedup</text>
<line x1="0" y1="146" x2="760" y2="146" class="grid"/>
<text x="32" y="132" class="scenario">Counter (10 attrs)</text>
<text x="418" y="132" class="v">90.7 ± 0.1</text>
<text x="588" y="132" class="v">257.6 ± 0.3</text>
<text x="728" y="132" class="v best">2.8x faster</text>
<rect x="0" y="146" width="760" height="40" fill="#f9fafb"/>
<line x1="0" y1="186" x2="760" y2="186" class="grid"/>
<text x="32" y="172" class="scenario">Counter (16 attrs)</text>
<text x="418" y="172" class="v">143.1 ± 0.3</text>
<text x="588" y="172" class="v">406.5 ± 1.0</text>
<text x="728" y="172" class="v best">2.8x faster</text>
<line x1="0" y1="226" x2="760" y2="226" class="grid"/>
<text x="32" y="212" class="scenario">Counter (3 attrs)</text>
<text x="418" y="212" class="v">26.2 ± 0.0</text>
<text x="588" y="212" class="v">88.8 ± 0.1</text>
<text x="728" y="212" class="v best">3.4x faster</text>
<rect x="0" y="226" width="760" height="40" fill="#f9fafb"/>
<line x1="0" y1="266" x2="760" y2="266" class="grid"/>
<text x="32" y="252" class="scenario">Counter (3 attrs cold)</text>
<text x="418" y="252" class="v">406.1 ± 0.7</text>
<text x="588" y="252" class="v">2512.2 ± 5.8</text>
<text x="728" y="252" class="v best">6.2x faster</text>
<line x1="0" y1="306" x2="760" y2="306" class="grid"/>
