\* TLC configuration for exporter.tla
\* Small bounds for feasible model checking

SPECIFICATION Spec

CONSTANTS
    Capacity = 2
    BatchSize = 2
    NumProducers = 2
    MaxConcurrent = 2

\* Safety invariants (checked in every reachable state)
INVARIANT ChannelBounded
INVARIANT DataConservation

\* Liveness properties (checked under fairness)
PROPERTY FlushCompletes
PROPERTY ShutdownTerminates
