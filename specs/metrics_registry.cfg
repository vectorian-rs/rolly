\* TLC configuration for metrics_registry.tla
\* Small bounds for feasible model checking

SPECIFICATION Spec

CONSTANTS
    NumWriters = 2
    NumInstruments = 2

\* Safety invariants (checked in every reachable state)
INVARIANT RwLockInvariant
INVARIANT LockOrdering
INVARIANT CollectorLockOrdering

\* Liveness properties (checked under fairness)
PROPERTY CollectorCompletes
PROPERTY WritersComplete
